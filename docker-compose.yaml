version: "3.7"

networks:
  traefik-public:
    external: true

services:
  personal-page:
    image: ${IMAGE_NAME:-ghcr.io/kacpermalachowski/personal-page:latest}
    environment:
      GRAPHQL_URL_ENDPOINT: ${GRAPHQL_URL_ENDPOINT}
    networks:
      - traefik-public
    ports:
      - 3002:3000
    deploy:
      mode: replicated
      replicas: 1
      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      update_config:
        parallelism: 1
        delay: 20s
        order: stop-first
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik-public
        - traefik.constraint-label=traefik-public
        - traefik.http.routers.kacpermalachowski-http.rule=Host(`kacpermalachowski.pl`)
        - traefik.http.routers.kacpermalachowski-http.entrypoints=http
        - traefik.http.routers.kacpermalachowski-http.middlewares=https-redirect
        - traefik.http.routers.kacpermalachowski-https.rule=Host(`kacpermalachowski.pl`)
        - traefik.http.routers.kacpermalachowski-https.entrypoints=https
        - traefik.http.routers.kacpermalachowski-https.tls=true
        - traefik.http.routers.kacpermalachowski-https.tls.certresolver=le
        - traefik.http.services.kacpermalachowski.loadbalancer.server.port=3000
